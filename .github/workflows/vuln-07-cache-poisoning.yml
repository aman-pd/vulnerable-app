name: "VULN-07: Cache Poisoning"

# VULNERABILITY: Cache shared between pull_request_target and push triggers
# RISK: Fork PR poisons npm cache, which is restored during main branch builds
# REAL WORLD: Attacker injects backdoored node_modules via PR, consumed by npm publish

on:
  pull_request_target:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-
      - name: Install and Build
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ci
          npm run build
      - name: Publish
        if: github.ref == 'refs/heads/main'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish || echo "publish skipped"
